<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads — VAPT</title>
  <link rel="icon" type="image/jpeg" href="vapt.jpeg" />
  <link rel="apple-touch-icon" href="vapt.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --line: rgba(13, 17, 23, .1);
      --text: #0d1117;
      --muted: rgba(13, 17, 23, .58);
      --soft: rgba(13, 17, 23, .04);
      --blue: #152eff;
      --blue-soft: rgba(21, 46, 255, .08);
      --red: #dc2626;
      --green: #047857;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }
    button { cursor: pointer; border: 0; }
    a { color: inherit; text-decoration: none; }

    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0 clamp(1rem, 4vw, 2.5rem);
      background: rgba(255,255,255,.86);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: .7rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .brand img { width: 34px; height: 34px; border-radius: 8px; object-fit: cover; }
    .top-actions { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; justify-content: flex-end; }

    .btn {
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 .9rem;
      border-radius: 8px;
      background: var(--text);
      color: #fff;
      font-weight: 700;
      font-size: .86rem;
      white-space: nowrap;
    }

    .btn.secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn.danger { background: var(--red); }
    .btn:disabled { opacity: .55; cursor: wait; }

    main {
      width: min(1120px, calc(100% - 2rem));
      margin: 2rem auto 3rem;
    }

    .login {
      width: min(420px, 100%);
      margin: 12vh auto 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 18px 50px rgba(15,23,42,.07);
    }

    h1 { font-size: clamp(1.55rem, 4vw, 2.2rem); letter-spacing: -.04em; line-height: 1.05; }
    .sub { color: var(--muted); margin-top: .55rem; font-size: .94rem; line-height: 1.45; }

    .login form { display: grid; gap: .75rem; margin-top: 1.1rem; }
    .code-box {
      display: none;
      gap: .75rem;
      padding-top: .75rem;
      border-top: 1px solid var(--line);
    }
    .code-box.show { display: grid; }
    label { color: var(--muted); font-size: .8rem; font-weight: 700; }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 .8rem;
      color: var(--text);
      background: #fff;
      outline: none;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.4;
    }
    .status.error { color: var(--red); }
    .status.ok { color: var(--green); }

    .dashboard { display: none; }
    .dash-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: .5rem;
      color: var(--muted);
      font-size: .88rem;
      flex-wrap: wrap;
    }

    .pill {
      background: var(--blue-soft);
      color: var(--blue);
      border-radius: 999px;
      padding: .35rem .65rem;
      font-size: .78rem;
      font-weight: 800;
    }

    .table-wrap {
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 14px 34px rgba(15,23,42,.05);
    }

    table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
      font-size: .9rem;
    }

    th, td {
      text-align: left;
      padding: .85rem .9rem;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: #fbfbfd;
      font-size: .76rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: var(--soft); }
    .empty {
      display: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      color: var(--muted);
    }

    .mono { color: var(--muted); font-size: .82rem; }
    .hide { display: none !important; }

    @media (max-width: 640px) {
      .topbar { height: auto; min-height: 64px; align-items: flex-start; padding-block: .85rem; }
      .brand span { display: none; }
      .dash-head { align-items: flex-start; flex-direction: column; }
      .top-actions { gap: .45rem; }
      .btn { height: 36px; padding-inline: .75rem; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <img src="vapt.jpeg" alt="VAPT" />
      <span>VAPT</span>
    </a>
    <div class="top-actions">
      <a class="btn secondary" href="index.html">Site</a>
      <button class="btn secondary hide" id="refreshBtn" type="button">Atualizar</button>
      <button class="btn danger hide" id="logoutBtn" type="button">Sair</button>
    </div>
  </header>

  <main>
    <section class="login" id="loginBox">
      <h1>Acesso aos leads</h1>
      <p class="sub">Entre com o email autorizado no Supabase para ver os cadastros recebidos.</p>
      <form id="loginForm">
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" value="vaptadmin@gmail.com" required />
        </div>
        <div>
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Sua senha" required minlength="6" />
        </div>
        <button class="btn" id="loginBtn" type="submit">Entrar</button>
        <button class="btn secondary" id="signupBtn" type="button">Criar primeiro acesso</button>
        <p class="status" id="loginStatus"></p>
      </form>
    </section>

    <section class="dashboard" id="dashboard">
      <div class="dash-head">
        <div>
          <h1>Leads cadastrados</h1>
          <p class="sub">Lista das pessoas que preencheram os formulários do site.</p>
        </div>
        <div class="meta">
          <span class="pill" id="countPill">0 leads</span>
          <span id="userEmail"></span>
        </div>
      </div>

      <div class="empty" id="emptyState">Nenhum lead cadastrado ainda.</div>

      <div class="table-wrap" id="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Empresa</th>
              <th>Cargo</th>
              <th>Email</th>
              <th>WhatsApp</th>
              <th>Usa IA?</th>
              <th>Origem</th>
            </tr>
          </thead>
          <tbody id="leadsBody"></tbody>
        </table>
      </div>

      <p class="status" id="loadStatus"></p>
    </section>
  </main>

  <script>
    const SUPABASE_URL = 'https://xudidufzbiiizphtoqwh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1ZGlkdWZ6YmlpaXpwaHRvcXdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDYzNjEsImV4cCI6MjA5NDc4MjM2MX0.JLz9lKMuyy1mvFwXun_QE0vhROj8_dxhjfa61nkAYI8';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginBox = document.getElementById('loginBox');
    const dashboard = document.getElementById('dashboard');
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const loginStatus = document.getElementById('loginStatus');
    const loadStatus = document.getElementById('loadStatus');
    const logoutBtn = document.getElementById('logoutBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const leadsBody = document.getElementById('leadsBody');
    const countPill = document.getElementById('countPill');
    const userEmail = document.getElementById('userEmail');
    const emptyState = document.getElementById('emptyState');
    const tableWrap = document.getElementById('tableWrap');
    const ADMIN_EMAIL = 'vaptadmin@gmail.com';

    function text(value) {
      return value === null || value === undefined || value === '' ? '-' : String(value);
    }

    function formatDate(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '-';
      return new Intl.DateTimeFormat('pt-BR', {
        dateStyle: 'short',
        timeStyle: 'short'
      }).format(date);
    }

    function showStatus(el, message, type) {
      el.textContent = message || '';
      el.className = `status${type ? ` ${type}` : ''}`;
    }

    function renderLeads(leads) {
      leadsBody.innerHTML = '';
      countPill.textContent = `${leads.length} ${leads.length === 1 ? 'lead' : 'leads'}`;
      emptyState.style.display = leads.length ? 'none' : 'block';
      tableWrap.style.display = leads.length ? 'block' : 'none';

      leads.forEach(lead => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="mono">${formatDate(lead.created_at)}</td>
          <td>${text(lead.empresa)}</td>
          <td>${text(lead.cargo)}</td>
          <td>${text(lead.email)}</td>
          <td>${text(lead.telefone)}</td>
          <td>${text(lead.usa_ia)}</td>
          <td>${text(lead.origem)}</td>
        `;
        leadsBody.appendChild(tr);
      });
    }

    async function loadLeads() {
      showStatus(loadStatus, 'Carregando leads...');
      refreshBtn.disabled = true;

      let query = sb.from('leads').select('*').order('created_at', { ascending: false });
      let { data, error } = await query;

      if (error && String(error.message).toLowerCase().includes('created_at')) {
        const fallback = await sb.from('leads').select('*');
        data = fallback.data;
        error = fallback.error;
      }

      refreshBtn.disabled = false;

      if (error) {
        showStatus(loadStatus, `Erro ao carregar: ${error.message}. Confira se o SQL de permissao foi aplicado com o mesmo email do login.`, 'error');
        renderLeads([]);
        return;
      }

      renderLeads(data || []);
      showStatus(loadStatus, `Atualizado em ${new Intl.DateTimeFormat('pt-BR', { timeStyle: 'short' }).format(new Date())}.`, 'ok');
    }

    async function showDashboard(session) {
      loginBox.style.display = 'none';
      dashboard.style.display = 'block';
      logoutBtn.classList.remove('hide');
      refreshBtn.classList.remove('hide');
      userEmail.textContent = session.user.email || '';
      await loadLeads();
    }

    function showLogin() {
      loginBox.style.display = 'block';
      dashboard.style.display = 'none';
      logoutBtn.classList.add('hide');
      refreshBtn.classList.add('hide');
      leadsBody.innerHTML = '';
      showStatus(loadStatus, '');
    }

    loginForm.addEventListener('submit', async event => {
      event.preventDefault();
      loginBtn.disabled = true;
      showStatus(loginStatus, 'Entrando...');

      const formData = new FormData(loginForm);
      const email = String(formData.get('email') || '').trim().toLowerCase();
      const password = String(formData.get('password') || '');

      if (email !== ADMIN_EMAIL) {
        loginBtn.disabled = false;
        showStatus(loginStatus, 'Este email nao esta autorizado.', 'error');
        return;
      }

      const { error } = await sb.auth.signInWithPassword({ email, password });

      loginBtn.disabled = false;

      if (error) {
        showStatus(loginStatus, `Erro: ${error.message}. Se ainda nao criou o acesso, clique em "Criar primeiro acesso".`, 'error');
        return;
      }

      showStatus(loginStatus, 'Acesso liberado.', 'ok');
    });

    signupBtn.addEventListener('click', async () => {
      signupBtn.disabled = true;
      showStatus(loginStatus, 'Criando acesso...');

      const formData = new FormData(loginForm);
      const email = String(formData.get('email') || '').trim().toLowerCase();
      const password = String(formData.get('password') || '');

      if (email !== ADMIN_EMAIL) {
        signupBtn.disabled = false;
        showStatus(loginStatus, 'Este email nao esta autorizado.', 'error');
        return;
      }

      if (password.length < 6) {
        signupBtn.disabled = false;
        showStatus(loginStatus, 'A senha precisa ter pelo menos 6 caracteres.', 'error');
        return;
      }

      const { error } = await sb.auth.signUp({ email, password });

      signupBtn.disabled = false;

      if (error) {
        showStatus(loginStatus, `Erro: ${error.message}`, 'error');
        return;
      }

      showStatus(loginStatus, 'Acesso criado. Se o Supabase pedir confirmacao, abra o email; depois clique em Entrar.', 'ok');
    });

    logoutBtn.addEventListener('click', async () => {
      await sb.auth.signOut();
      showLogin();
    });

    refreshBtn.addEventListener('click', loadLeads);

    sb.auth.onAuthStateChange((_event, session) => {
      if (session) showDashboard(session);
      else showLogin();
    });

    (async () => {
      const { data } = await sb.auth.getSession();
      if (data.session) await showDashboard(data.session);
      else showLogin();
    })();
  </script>
</body>
</html>
